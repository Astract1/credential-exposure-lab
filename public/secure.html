<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Version Segura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container secure">
    <h1>Registro de Usuario</h1>
    <span class="badge good">VERSION SEGURA</span>
    <p class="lead">
      El servidor aplica <strong>hashing bcrypt</strong> antes de guardar la contrasena.
      Repite el procedimiento de DevTools y compara la peticion
      <code>register-secure</code> y los datos almacenados con la version vulnerable.
    </p>

    <form id="register-form">
      <label>
        Usuario
        <input type="text" name="username" autocomplete="off" required>
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="off" required>
      </label>
      <label>
        Contrasena
        <input type="password" name="password" autocomplete="new-password" required>
      </label>
      <button type="submit">Registrar</button>
    </form>

    <div id="result" aria-live="polite"></div>

    <div class="links">
      <a href="index.html">&larr; Ver version vulnerable</a>
      <a href="/admin/secure-data" target="_blank">Ver datos almacenados</a>
    </div>
  </div>
  <script src="secure.js"></script>
</body>
</html>
