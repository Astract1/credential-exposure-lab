<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Version Vulnerable</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container vulnerable">
    <h1>Registro de Usuario</h1>
    <span class="badge bad">VERSION VULNERABLE</span>
    <p class="lead">
      Esta aplicacion envia la contrasena en <strong>texto plano</strong> y la
      almacena sin cifrar. Abre <kbd>F12</kbd> &rarr; pestana <strong>Network</strong>,
      activa <strong>Preserve log</strong> y registra un usuario.
      Luego inspecciona la peticion <code>register</code> en la pestana <strong>Payload</strong>.
    </p>

    <form id="register-form">
      <label>
        Usuario
        <input type="text" name="username" autocomplete="off" required>
      </label>
      <label>
        Email
        <input type="email" name="email" autocomplete="off" required>
      </label>
      <label>
        Contrasena
        <input type="password" name="password" autocomplete="new-password" required>
      </label>
      <button type="submit">Registrar</button>
    </form>

    <div id="result" aria-live="polite"></div>

    <div class="links">
      <a href="secure.html">Ver version segura &rarr;</a>
      <a href="/admin/vulnerable-data" target="_blank">Ver datos almacenados</a>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
